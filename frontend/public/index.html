<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Slay the Spire (WASM)</title>
  <style>
    html, body { margin: 0; height: 100%; background: #000; color: #ccc; font: 13px monospace; }
    #wrap { display: flex; height: 100%; }
    #canvas { background: #000; display: block; image-rendering: pixelated; flex: 1 1 auto; outline: none; }
    #log { width: 38ch; overflow: auto; padding: 6px; white-space: pre-wrap; border-left: 1px solid #333; }
    .err { color: #f66; } .warn { color: #fd6; } .info { color: #6cf; }
  </style>
</head>
<body>
  <div id="wrap">
    <canvas id="canvas" class="canvas" tabindex="-1" oncontextmenu="event.preventDefault()" width="1280" height="720"></canvas>
    <div id="log"></div>
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
