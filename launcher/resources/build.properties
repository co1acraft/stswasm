# Overrides Slay the Spire's bundled build.properties (distributor=steam). This launcher jar is
# earlier on the classpath than desktop-1.0.jar, and CardCrawlGame loads build.properties via
# Gdx.files.internal(...).reader() -> getResourceAsStream("/build.properties"), which returns the
# first match on the classpath. "wegame" selects WeGameIntegration: a complete no-op publisher
# integration (empty ctor, every PublisherIntegration method returns a default, no native libs),
# so the game runs without Steam/GOG/Discord native SDKs that cannot load in WASM.
distributor=wegame
